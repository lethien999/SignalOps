# Default HTTP to HTTPS redirect (optional: remove if you only want HTTPS)
server {
  listen 80;
  listen [::]:80;
  server_name _;

  location = /nginx-health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Redirect all HTTP traffic to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS server block
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name _;

  # SSL Certificate Configuration
  # Requirements: Place certificate and key in /etc/nginx/certs/ volume
  # Or generate self-signed cert for development:
  #   openssl req -x509 -newkey rsa:4096 -nodes -out /etc/nginx/certs/cert.pem -keyout /etc/nginx/certs/key.pem -days 365
  ssl_certificate /etc/nginx/certs/cert.pem;
  ssl_certificate_key /etc/nginx/certs/key.pem;

  # SSL Configuration Best Practices
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets off;

  # HSTS: Tell browsers to always use HTTPS (be careful: persists up to 1 year)
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Security Headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  location = /nginx-health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location /api/ {
    proxy_pass http://api-gateway:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    
    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /socket.io/ {
    proxy_pass http://api-gateway:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    
    # WebSocket timeouts (longer than HTTP)
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  location / {
    return 200 'SignalOps Nginx reverse proxy (HTTPS) is running';
    add_header Content-Type text/plain;
  }
}
