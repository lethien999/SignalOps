services:
  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:1.27-alpine
    container_name: signalops-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - signalops
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: signalops-mongodb
    command: mongod --bind_ip_all --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_INITDB_DATABASE}
    ports:
      # Dev only: do not expose in production. Use -f docker-compose.prod.yml
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - signalops
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping')\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: signalops-redis
    command: redis-server --appendonly yes
    ports:
      # Dev only: do not expose in production. Use -f docker-compose.prod.yml
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - signalops
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    container_name: signalops-api-gateway
    environment:
      - NODE_ENV=${NODE_ENV}
      - REDIS_ENABLED=true
      - API_GATEWAY_PORT=${API_GATEWAY_PORT}
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - API_KEY=${API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - signalops
    command: node dist/apps/api-gateway/main.js
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Worker Service
  worker:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.worker
    container_name: signalops-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - REDIS_ENABLED=true
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY}
      - QUEUE_EVENT_PROCESSING=${QUEUE_EVENT_PROCESSING}
      - THRESHOLD_LATENCY_MS=${THRESHOLD_LATENCY_MS}
      - THRESHOLD_PACKET_LOSS_PERCENT=${THRESHOLD_PACKET_LOSS_PERCENT}
      - THRESHOLD_SIGNAL_STRENGTH_DBM=${THRESHOLD_SIGNAL_STRENGTH_DBM}
      - ANOMALY_THRESHOLD=${ANOMALY_THRESHOLD}
      - AI_ROLLOUT_PERCENT=${AI_ROLLOUT_PERCENT}
      - AI_AB_TEST=${AI_AB_TEST}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - signalops
    command: node dist/apps/worker-service/main.js
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Simulator
  simulator:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.simulator
    container_name: signalops-simulator
    environment:
      - NODE_ENV=${NODE_ENV}
      - SIMULATOR_DEVICES_COUNT=${SIMULATOR_DEVICES_COUNT}
      - SIMULATOR_INTERVAL_MS=${SIMULATOR_INTERVAL_MS}
      - SIMULATOR_API_URL=${SIMULATOR_API_URL}
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - signalops
    command: node dist/apps/simulator/main.js
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

  # Dashboard
  dashboard:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.dashboard
    container_name: signalops-dashboard
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - signalops
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3001 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  signalops:
    driver: bridge
    name: signalops

volumes:
  mongodb_data:
  redis_data:
