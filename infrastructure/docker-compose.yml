services:
  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:1.27-alpine
    container_name: signalops-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - signalops
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: signalops-mongodb
    environment:
      MONGO_INITDB_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_INITDB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - signalops
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: signalops-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - signalops
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    container_name: signalops-api-gateway
    environment:
      - NODE_ENV=${NODE_ENV}
      - REDIS_ENABLED=true
      - API_GATEWAY_PORT=${API_GATEWAY_PORT}
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - signalops
    command: npm run start -w api-gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Event Broker
  event-broker:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.broker
    container_name: signalops-event-broker
    environment:
      - NODE_ENV=${NODE_ENV}
      - REDIS_ENABLED=true
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    networks:
      - signalops
    command: npm run start -w event-broker

  # Worker Service
  worker:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.worker
    container_name: signalops-worker
    environment:
      - NODE_ENV=${NODE_ENV}
      - REDIS_ENABLED=true
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY}
      - QUEUE_EVENT_PROCESSING=${QUEUE_EVENT_PROCESSING}
      - THRESHOLD_LATENCY_MS=${THRESHOLD_LATENCY_MS}
      - THRESHOLD_PACKET_LOSS_PERCENT=${THRESHOLD_PACKET_LOSS_PERCENT}
      - THRESHOLD_SIGNAL_STRENGTH_DBM=${THRESHOLD_SIGNAL_STRENGTH_DBM}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - signalops
    command: npm run start -w worker-service
    deploy:
      replicas: 1

  # Simulator
  simulator:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.simulator
    container_name: signalops-simulator
    environment:
      - NODE_ENV=${NODE_ENV}
      - SIMULATOR_DEVICES_COUNT=${SIMULATOR_DEVICES_COUNT}
      - SIMULATOR_INTERVAL_MS=${SIMULATOR_INTERVAL_MS}
      - SIMULATOR_API_URL=${SIMULATOR_API_URL}
      - LOG_LEVEL=${LOG_LEVEL}
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - signalops
    command: npm run start -w simulator

  # Dashboard
  dashboard:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.dashboard
    container_name: signalops-dashboard
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_URL=http://api-gateway:3000/api
      - NEXT_PUBLIC_SOCKET_URL=http://api-gateway:3000
    ports:
      - "3001:3001"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - signalops
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3001 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  signalops:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
