global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'signalops-api-gateway'
    metrics_path: '/api/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['signalops-api-gateway:3000']
        labels:
          service: 'api-gateway'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
