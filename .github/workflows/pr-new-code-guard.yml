name: PR New Code Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  no-explicit-any-in-new-code:
    name: No explicit any in new code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan PR diff for new explicit any
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          diff_output=$(git diff --unified=0 --no-color "origin/${{ github.base_ref }}...HEAD" -- '*.ts' '*.tsx' '*.js' '*.jsx')

          violations=$(printf '%s\n' "$diff_output" | grep -E '^\+[^+].*(:\s*any\b|as\s+any\b|<any>)' || true)

          if [ -n "$violations" ]; then
            echo "Detected new explicit any usage in PR changes:"
            printf '%s\n' "$violations"
            echo
            echo "Please replace explicit any with a stricter type before merging."
            exit 1
          fi

          echo "No new explicit any usage found in PR changes."
